<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>RetroShop</title>

  <!-- CSS locali (serviti dalla root grazie a publicDir: '.') -->
  <link rel="stylesheet" href="bootstrap.css" />
  <!-- Stili custom: ordine importante — base prima, tema-chiaro per ultimo (deve vincere su tutto) -->
  <link rel="stylesheet" href="base.css" />
  <link rel="stylesheet" href="navbar.css" />
  <link rel="stylesheet" href="componenti.css" />
  <link rel="stylesheet" href="pagine.css" />
  <link rel="stylesheet" href="tema-chiaro.css" />

  <!-- CSS CDN -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" />
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
</head>
<body>
  <!-- Applica il tema salvato PRIMA del render per evitare il flash -->
  <script>
    if (localStorage.getItem('temaSelezionato') === 'light') {
      document.body.classList.add('tema-chiaro');
    }
  </script>

  <div id="root"></div>

  <!-- JS CDN — caricati PRIMA del modulo React (i moduli sono sempre defer) -->
  <script src="bootstrap.bundle.min.js"></script>
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

  <script type="module" src="/src/main.jsx"></script>
</body>
</html>
