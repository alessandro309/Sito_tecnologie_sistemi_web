<!DOCTYPE html>
<html lang="it">
<body>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="bootstrap.css">
    <link rel="stylesheet" href="barra_superiore.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">    <link rel="stylesheet" href="oggetti_home.css">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

    <title>RetroShop</title>
</head>

<div class="container mt-5 pt-4 font-monospace text-white">
    <div class="row g-4">
        
        <div class="col-lg-3">
            <div class="list-group sidebar-profilo shadow-sm">

                <a href="#" id="btnMenuProfilo" class="list-group-item list-group-item-action active py-3">
                    <i class="bi bi-person-badge fs-5 me-2 align-middle"></i> Il mio profilo
                </a>

                <a href="#" id="btnMenuImpostazioni" class="list-group-item list-group-item-action py-3">
                    <i class="bi bi-gear fs-5 me-2 align-middle"></i> Impostazioni
                </a>
                
                <a href="#" class="list-group-item list-group-item-action py-3">
                    <i class="bi bi-box-seam fs-5 me-2 align-middle"></i> Vecchi ordini
                </a>
                
                <a href="#" class="list-group-item list-group-item-action py-3">
                    <i class="bi bi-floppy fs-5 me-2 align-middle"></i> Preferiti
                </a>
                
            </div>
        </div>

        <div class="col-lg-9">
            <div class="col-lg-9 position-relative">

            <div id="sezioneProfilo">
                </div>

                <div id="sezioneImpostazioni" class="d-none">
                    <div class="border-bottom border-secondary pb-2 mb-4">
                        <h3 class="fw-bold m-0 text-uppercase"><i class="bi bi-gear"></i> Impostazioni</h3>
                    </div>

                    <div class="bg-black border border-secondary rounded-2 p-4 mb-4">
                        <h6 class="text-secondary fw-bold mb-3">TEMA DELL'INTERFACCIA</h6>
                        <div class="d-flex gap-4">
                            <div class="form-check">
                                <input class="form-check-input" type="radio" name="sceltaTema" id="temaScuro" value="dark" checked>
                                <label class="form-check-label" for="temaScuro">Tema Scuro (Predefinito)</label>
                            </div>
                            <div class="form-check">
                                <input class="form-check-input" type="radio" name="sceltaTema" id="temaChiaro" value="light">
                                <label class="form-check-label" for="temaChiaro">Tema Chiaro (Azzurro)</label>
                            </div>
                        </div>
                    </div>

                    <div class="bg-black border border-secondary rounded-2 p-4 mb-4">
                        <h6 class="text-secondary fw-bold mb-3">INFORMAZIONI PERSONALI</h6>
                        <form id="formInfoPersonali">
                            <div class="row g-3">
                                <div class="col-md-6">
                                    <label class="form-label small mb-1">Nome</label>
                                    <input type="text" class="form-control bg-transparent text-white border-secondary" placeholder="Tuo Nome">
                                </div>
                                <div class="col-md-6">
                                    <label class="form-label small mb-1">Cognome</label>
                                    <input type="text" class="form-control bg-transparent text-white border-secondary" placeholder="Tuo Cognome">
                                </div>
                                <div class="col-12">
                                    <label class="form-label small mb-1">Email</label>
                                    <input type="email" class="form-control bg-transparent text-white border-secondary" placeholder="nome@email.com">
                                </div>
                                <div class="col-12 mt-4 text-end">
                                    <button type="submit" class="btn btn-outline-light btn-sm px-4">Aggiorna Info</button>
                                </div>
                            </div>
                        </form>
                    </div>

                    <div class="bg-black border border-secondary rounded-2 p-4">
                        <h6 class="text-secondary fw-bold mb-3">CAMBIA PASSWORD</h6>
                        <form id="formPassword">
                            <div class="row g-3">
                                <div class="col-md-4">
                                    <input type="password" class="form-control bg-transparent text-white border-secondary" placeholder="Vecchia Password">
                                </div>
                                <div class="col-md-4">
                                    <input type="password" class="form-control bg-transparent text-white border-secondary" placeholder="Nuova Password">
                                </div>
                                <div class="col-md-4">
                                    <input type="password" class="form-control bg-transparent text-white border-secondary" placeholder="Conferma Nuova">
                                </div>
                                <div class="col-12 mt-3 text-end">
                                    <button type="submit" class="btn btn-outline-danger btn-sm px-4">Cambia Password</button>
                                </div>
                            </div>
                        </form>
                    </div>

                </div> </div>
            <div class="d-flex align-items-center gap-4 mb-5 p-4 bg-black border border-secondary rounded-2 shadow-sm">
                <div class="position-relative">
                    <img src="https://dummyimage.com/150x150/1a1a1a/dc3545.png&text=User" alt="Foto Profilo" id="foto_profilo_utente" class="rounded-circle border border-3 border-danger" style="width: 120px; height: 120px; object-fit: cover; aspect-ratio: 1/1;">
                </div>
                
                <div>
                    <h2 class="fw-bold mb-1 text-uppercase">Nome Utente</h2>
                    <p class="text-secondary mb-0 small">Iscritto dal: <span class="text-white">12 Aprile 2024</span></p>
                </div>
            </div>

            <div class="border-bottom border-secondary pb-2 mb-4">
                <h4 class="fw-bold m-0">I MIEI ANNUNCI <span class="text-danger">(2)</span></h4>
            </div>

            <div class="row g-4">
                
                <div class="col-md-6 col-xl-4">
                    <div class="card bg-black border-secondary h-100 text-white">
                        <div class="bg-secondary" style="height: 180px;"></div>
                        <div class="card-body">
                            <h6 class="card-title fw-bold text-truncate">PlayStation 5 Usata</h6>
                            <p class="card-text text-danger fw-bold m-0">€ 450,00</p>
                        </div>
                        <div class="card-footer border-secondary bg-transparent d-flex justify-content-between">
                            <button class="btn btn-sm btn-outline-light"><i class="bi bi-pencil"></i> Modifica</button>
                            <button class="btn btn-sm btn-outline-danger"><i class="bi bi-trash"></i></button>
                        </div>
                    </div>
                </div>

                <div class="col-md-6 col-xl-4">
                    <div class="card bg-black border-secondary h-100 text-white">
                        <div class="bg-secondary" style="height: 180px;"></div>
                        <div class="card-body">
                            <h6 class="card-title fw-bold text-truncate">Zelda: Breath of the Wild</h6>
                            <p class="card-text text-danger fw-bold m-0">€ 40,00</p>
                        </div>
                        <div class="card-footer border-secondary bg-transparent d-flex justify-content-between">
                            <button class="btn btn-sm btn-outline-light"><i class="bi bi-pencil"></i> Modifica</button>
                            <button class="btn btn-sm btn-outline-danger"><i class="bi bi-trash"></i></button>
                        </div>
                    </div>
                </div>

            </div> </div>
    </div>
</div>

<script src="bootstrap.bundle.min.js"></script>
    <script src="profilo.js"></script>
</body>
</html>
